name: commitchi tick

on:
  schedule:
    # every 6 hours
    - cron: "0 */6 * * *"
  # Run manually the first time from the Actions tab to seed pet.svg.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: commitchi-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Tick the pet
        run: node dist/index.js
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          # GITHUB_TOKEN covers public contributions. For private contribution
          # counts, create a PAT with read:user and store it as secret PET_TOKEN.
          GH_TOKEN: ${{ secrets.PET_TOKEN || github.token }}

      - name: Commit the pet
        run: |
          git config user.name "commitchi-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pet.svg pet-state.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "chore: tick the pet 🐣"
            git push
          fi
